# render.yaml — Render.com Infrastructure Blueprint
# Push this file to your GitHub repo, then connect it on Render
# Render will auto-create the web service + PostgreSQL database

services:
  - type: web
    name: alarmist
    runtime: python
    plan: free                          # upgrade to starter ($7/mo) for production
    region: singapore                   # closest to India; options: oregon, frankfurt, ohio
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    healthCheckPath: /health

    envVars:
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true             # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: alarmist-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false                     # You fill this in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

databases:
  - name: alarmist-db
    databaseName: alarmist
    plan: free                          # 1GB storage, upgrade as needed
    region: singapore
